<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust Network — SentinelNet</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>">
    <style>
        :root { --bg: #080810; --card: #0f0f1a; --border: #1e1e3a; --text: #e8e8f0; --muted: #555570; --sec: #8888aa; --blue: #0088ff; --cyan: #00ccff; --trust: #00dd77; --caution: #ffaa22; --reject: #ff3344; --sybil: #cc44ff; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        .nav { background: #0c0c18; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; }
        .nav .left { display: flex; align-items: center; gap: 16px; font-size: 13px; }
        .nav .logo { color: var(--cyan); font-weight: 800; font-size: 18px; text-decoration: none; }
        .nav .sep { color: var(--muted); }
        .nav-link { color: var(--sec); text-decoration: none; font-size: 12px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 8px; }
        .nav-link:hover { color: var(--cyan); border-color: var(--cyan); text-decoration: none; }
        a { color: var(--blue); text-decoration: none; }
        #graph-container { width: 100vw; height: calc(100vh - 53px); position: relative; }
        svg { width: 100%; height: 100%; }

        .tooltip { position: absolute; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; pointer-events: none; opacity: 0; transition: opacity 0.15s; font-size: 12px; z-index: 20; min-width: 180px; }
        .tooltip .tt-id { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .tooltip .tt-score { font-size: 24px; font-weight: 800; }
        .tooltip .tt-verdict { font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .tooltip .tt-wallet { font-family: monospace; font-size: 10px; color: var(--muted); margin-top: 6px; }
        .tooltip .tt-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-top: 4px; }

        .legend { position: absolute; bottom: 20px; left: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; font-size: 11px; z-index: 10; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        .controls { position: absolute; top: 20px; right: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; font-size: 11px; z-index: 10; }
        .controls label { display: block; margin-bottom: 6px; color: var(--sec); }
        .controls input[type=range] { width: 120px; }
        .stat-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: 12px; z-index: 10; display: flex; gap: 20px; }
        .stat-bar span { color: var(--sec); }
        .stat-bar strong { color: var(--cyan); }
    </style>
</head>
<body>
    <div class="nav">
        <div class="left">
            <a href="/" class="logo">SentinelNet</a>
            <span class="sep">/</span>
            <a href="/dashboard">Dashboard</a>
            <span class="sep">/</span>
            <span style="color:var(--text)">Trust Network</span>
        </div>
        <span style="display:flex;gap:8px"><a href="/" class="nav-link">← Home</a></span>
    </div>

    <div id="graph-container">
        <div class="stat-bar" id="stats"></div>
        <div class="tooltip" id="tooltip"></div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--trust)"></div> Trusted (>=55)</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--caution)"></div> Caution (40-54)</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--reject)"></div> Rejected (<40)</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--sybil)"></div> Sybil Flagged</div>
            <div class="legend-item" style="margin-top:8px;color:var(--muted)">Lines = interactions</div>
            <div class="legend-item" style="color:var(--muted)">Node size = trust score</div>
        </div>
        <div class="controls">
            <label>Link Distance <input type="range" id="dist" min="20" max="200" value="80"></label>
            <label>Charge Strength <input type="range" id="charge" min="-300" max="-10" value="-80"></label>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        const width = window.innerWidth;
        const height = window.innerHeight - 53;
        const tooltip = document.getElementById('tooltip');

        function col(v, sybil) {
            if (sybil) return 'var(--sybil)';
            if (v === 'TRUST') return 'var(--trust)';
            if (v === 'CAUTION') return 'var(--caution)';
            return 'var(--reject)';
        }

        const svg = d3.select('#graph-container').append('svg')
            .attr('viewBox', [0, 0, width, height]);

        const g = svg.append('g');

        // Zoom
        svg.call(d3.zoom().scaleExtent([0.1, 8]).on('zoom', ({transform}) => {
            g.attr('transform', transform);
        }));

        fetch('/api/graph-data').then(r => r.json()).then(data => {
            const { nodes, links } = data;

            // Stats
            document.getElementById('stats').innerHTML = `
                <span>Nodes: <strong>${nodes.length}</strong></span>
                <span>Edges: <strong>${links.length}</strong></span>
                <span>Sybil: <strong style="color:var(--sybil)">${nodes.filter(n=>n.sybil).length}</strong></span>
            `;

            const simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(80))
                .force('charge', d3.forceManyBody().strength(-80))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => Math.max(4, d.score / 8) + 2));

            // Links
            const link = g.append('g')
                .selectAll('line')
                .data(links)
                .join('line')
                .attr('stroke', '#1e1e3a')
                .attr('stroke-opacity', 0.4)
                .attr('stroke-width', d => Math.min(Math.sqrt(d.weight), 3));

            // Nodes
            const node = g.append('g')
                .selectAll('circle')
                .data(nodes)
                .join('circle')
                .attr('r', d => Math.max(4, d.score / 8))
                .attr('fill', d => col(d.verdict, d.sybil))
                .attr('stroke', d => d.sybil ? 'var(--sybil)' : 'none')
                .attr('stroke-width', d => d.sybil ? 2 : 0)
                .attr('opacity', 0.85)
                .call(d3.drag()
                    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
                );

            // Tooltip
            node.on('mouseover', (e, d) => {
                const color = col(d.verdict, d.sybil);
                let badges = '';
                if (d.sybil) badges += '<span class="tt-badge" style="background:rgba(204,68,255,0.15);color:var(--sybil)">SYBIL</span> ';
                if (d.contagion && d.contagion !== 0) badges += `<span class="tt-badge" style="background:rgba(0,136,255,0.1);color:var(--blue)">CONTAGION ${d.contagion > 0 ? '+' : ''}${d.contagion}</span>`;

                tooltip.innerHTML = `
                    <div class="tt-id">Agent #${d.id}</div>
                    <div class="tt-score" style="color:${color}">${d.score}</div>
                    <div class="tt-verdict" style="color:${color}">${d.verdict}</div>
                    <div class="tt-wallet">${d.wallet}</div>
                    <div style="margin-top:4px">Identity: ${d.identity}/100</div>
                    ${badges ? '<div style="margin-top:6px">' + badges + '</div>' : ''}
                `;
                tooltip.style.opacity = 1;
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY - 53) + 'px';
            }).on('mousemove', (e) => {
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY - 53) + 'px';
            }).on('mouseout', () => {
                tooltip.style.opacity = 0;
            }).on('click', (e, d) => {
                window.open(`/agent/${d.id}`, '_blank');
            });

            simulation.on('tick', () => {
                link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                node.attr('cx', d => d.x).attr('cy', d => d.y);
            });

            // Controls
            document.getElementById('dist').addEventListener('input', function() {
                simulation.force('link').distance(+this.value);
                simulation.alpha(0.3).restart();
            });
            document.getElementById('charge').addEventListener('input', function() {
                simulation.force('charge').strength(+this.value);
                simulation.alpha(0.3).restart();
            });
        });
    </script>
</body>
</html>
