<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Marketplace — SentinelNet</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>">
    <style>
        :root { --bg: #080810; --card: #0f0f1a; --card-hover: #14142a; --border: #1e1e3a; --border-bright: #2a2a50; --text: #e8e8f0; --muted: #555570; --sec: #8888aa; --blue: #0088ff; --cyan: #00ccff; --trust: #00dd77; --caution: #ffaa22; --reject: #ff3344; --sybil: #cc44ff; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        a { color: var(--blue); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .nav { background: #0c0c18; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; gap: 16px; font-size: 13px; }
        .nav .logo { color: var(--cyan); font-weight: 800; font-size: 18px; text-decoration: none; }
        .nav .sep { color: var(--muted); }
        .nav-link { color: var(--sec); text-decoration: none; font-size: 12px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 8px; }
        .nav-link:hover { color: var(--cyan); border-color: var(--cyan); text-decoration: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 28px; }
        h1 { font-size: 28px; margin-bottom: 6px; }
        .subtitle { font-size: 14px; color: var(--sec); margin-bottom: 24px; }

        /* Live indicator */
        .live-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding: 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; font-size: 12px; color: var(--sec); }
        .live-dot { width: 8px; height: 8px; background: var(--trust); border-radius: 50%; animation: pulse 2s infinite; }
        .live-count { color: var(--cyan); font-weight: 700; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Filters */
        .filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
        .filter-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 12px; color: var(--sec); cursor: pointer; transition: all 0.15s; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--cyan); color: var(--cyan); }
        .filter-btn.active-trust { border-color: var(--trust); color: var(--trust); }
        .filter-btn.active-caution { border-color: var(--caution); color: var(--caution); }
        .filter-btn.active-reject { border-color: var(--reject); color: var(--reject); }
        .search-input { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 12px; color: var(--text); outline: none; width: 200px; }
        .search-input:focus { border-color: var(--cyan); }
        .search-input::placeholder { color: var(--muted); }

        /* Agent Grid */
        .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

        .agent-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: all 0.2s; cursor: pointer; position: relative; overflow: hidden; }
        .agent-card:hover { border-color: var(--border-bright); background: var(--card-hover); transform: translateY(-2px); }
        .agent-card.trust-border { border-left: 3px solid var(--trust); }
        .agent-card.caution-border { border-left: 3px solid var(--caution); }
        .agent-card.reject-border { border-left: 3px solid var(--reject); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .agent-name { font-size: 18px; font-weight: 700; color: var(--cyan); }
        .agent-wallet { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 2px; }
        .score-badge { font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .score-trust { color: var(--trust); }
        .score-caution { color: var(--caution); }
        .score-reject { color: var(--reject); }

        .verdict-pill { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .pill-trust { background: rgba(0,221,119,0.1); color: var(--trust); border: 1px solid rgba(0,221,119,0.2); }
        .pill-caution { background: rgba(255,170,34,0.1); color: var(--caution); border: 1px solid rgba(255,170,34,0.2); }
        .pill-reject { background: rgba(255,51,68,0.1); color: var(--reject); border: 1px solid rgba(255,51,68,0.2); }

        .dims { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 12px 0; }
        .dim { text-align: center; }
        .dim-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .dim-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .dim-bar .fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
        .dim-val { font-size: 12px; font-weight: 600; margin-top: 2px; }

        .card-labels { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .label-tag { font-size: 9px; padding: 2px 8px; border-radius: 10px; background: rgba(0,204,255,0.08); color: var(--cyan); border: 1px solid rgba(0,204,255,0.15); }
        .label-tag.sybil { background: rgba(204,68,255,0.1); color: var(--sybil); border-color: rgba(204,68,255,0.2); }

        .card-actions { display: flex; gap: 8px; margin-top: 14px; }
        .btn { padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
        .btn-primary { background: rgba(0,204,255,0.1); color: var(--cyan); border: 1px solid rgba(0,204,255,0.3); }
        .btn-primary:hover { background: rgba(0,204,255,0.2); }
        .btn-trust { background: rgba(0,221,119,0.1); color: var(--trust); border: 1px solid rgba(0,221,119,0.3); }
        .btn-trust:hover { background: rgba(0,221,119,0.2); }
        .btn-outline { background: transparent; color: var(--sec); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--sec); color: var(--text); }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 32px; }
        .page-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 12px; color: var(--sec); cursor: pointer; }
        .page-btn:hover, .page-btn.active { border-color: var(--cyan); color: var(--cyan); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; max-width: 480px; width: 90%; }
        .modal h3 { font-size: 18px; margin-bottom: 12px; }
        .modal p { font-size: 13px; color: var(--sec); margin-bottom: 8px; }
        .modal .close-btn { margin-top: 16px; }

        .empty { text-align: center; padding: 60px; color: var(--muted); }

        @media (max-width: 700px) { .agent-grid { grid-template-columns: 1fr; } .filters { flex-direction: column; } .search-input { width: 100%; } }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/" class="logo">SentinelNet</a>
        <span class="sep">/</span>
        <span style="color:var(--text)">Agent Marketplace</span>
        <span style="margin-left:auto;display:flex;gap:8px">
            <a href="/" class="nav-link">&larr; Home</a>
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/graph" class="nav-link">Trust Network</a>
        </span>
    </div>

    <div class="container">
        <h1>Agent Marketplace</h1>
        <p class="subtitle">Browse, filter, and interact with trust-scored ERC-8004 agents. Only trusted agents pass the TrustGate.</p>

        <div class="live-bar" id="live-bar">
            <span class="live-dot"></span>
            <span>Live — <span class="live-count" id="ws-status">connecting...</span></span>
            <span style="margin-left:auto;font-size:11px" id="total-count"></span>
        </div>

        <div class="filters">
            <input type="text" class="search-input" id="search" placeholder="Search agent ID or wallet...">
            <button class="filter-btn active" data-verdict="">All</button>
            <button class="filter-btn" data-verdict="TRUST">Trusted</button>
            <button class="filter-btn" data-verdict="CAUTION">Caution</button>
            <button class="filter-btn" data-verdict="REJECT">Rejected</button>
        </div>

        <div class="agent-grid" id="grid"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- TrustGate Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modal-title">TrustGate Check</h3>
            <p id="modal-body"></p>
            <div id="modal-detail"></div>
            <button class="btn btn-outline close-btn" onclick="document.getElementById('modal').classList.remove('show')">Close</button>
        </div>
    </div>

    <script>
        let currentVerdict = '';
        let currentSearch = '';
        let currentPage = 1;
        const PER_PAGE = 20;

        // WebSocket for live updates
        let ws;
        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(proto + '//' + location.host + '/ws/scores');
            ws.onopen = () => { document.getElementById('ws-status').textContent = 'streaming updates'; };
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.event === 'score_update') {
                    // Flash the updated card
                    const card = document.querySelector(`[data-agent="${data.agent_id}"]`);
                    if (card) {
                        card.style.boxShadow = '0 0 20px rgba(0,204,255,0.3)';
                        setTimeout(() => card.style.boxShadow = '', 2000);
                    }
                    // Reload after a short delay to show fresh data
                    clearTimeout(window._reloadTimer);
                    window._reloadTimer = setTimeout(loadAgents, 3000);
                }
            };
            ws.onclose = () => {
                document.getElementById('ws-status').textContent = 'reconnecting...';
                setTimeout(connectWS, 3000);
            };
        }
        connectWS();

        // Filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'active-trust', 'active-caution', 'active-reject'));
                const v = btn.dataset.verdict;
                currentVerdict = v;
                currentPage = 1;
                if (v === 'TRUST') btn.classList.add('active-trust');
                else if (v === 'CAUTION') btn.classList.add('active-caution');
                else if (v === 'REJECT') btn.classList.add('active-reject');
                else btn.classList.add('active');
                loadAgents();
            });
        });

        document.getElementById('search').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            currentPage = 1;
            clearTimeout(window._searchTimer);
            window._searchTimer = setTimeout(loadAgents, 300);
        });

        function dimColor(val) {
            if (val >= 70) return 'var(--trust)';
            if (val >= 40) return 'var(--caution)';
            return 'var(--reject)';
        }

        function renderCard(agent) {
            const v = agent.verdict || 'UNSCORED';
            const vLower = v.toLowerCase();
            const dims = ['longevity', 'activity', 'counterparty', 'contract_risk', 'agent_identity'];
            const dimLabels = ['LON', 'ACT', 'CP', 'RISK', 'ID'];
            const labels = agent.classification?.labels || [];

            return `
                <div class="agent-card ${vLower}-border" data-agent="${agent.agent_id}">
                    <div class="card-header">
                        <div>
                            <div class="agent-name">Agent #${agent.agent_id}</div>
                            <div class="agent-wallet">${agent.wallet || ''}</div>
                        </div>
                        <div style="text-align:right">
                            <div class="score-badge score-${vLower}">${agent.trust_score}</div>
                            <span class="verdict-pill pill-${vLower}">${v}</span>
                        </div>
                    </div>
                    <div class="dims">
                        ${dims.map((d, i) => {
                            const val = d === 'agent_identity' ? (agent.agent_identity || 0) : (agent[d] || 0);
                            return `<div class="dim">
                                <div class="dim-label">${dimLabels[i]}</div>
                                <div class="dim-bar"><div class="fill" style="width:${val}%;background:${dimColor(val)}"></div></div>
                                <div class="dim-val" style="color:${dimColor(val)}">${val}</div>
                            </div>`;
                        }).join('')}
                    </div>
                    <div class="card-labels">
                        ${labels.map(l => `<span class="label-tag${l === 'sybil_suspect' ? ' sybil' : ''}">${l.replace(/_/g, ' ')}</span>`).join('')}
                        ${agent.sybil_flagged ? '<span class="label-tag sybil">SYBIL</span>' : ''}
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-trust" onclick="trustGate(${agent.agent_id}, ${agent.trust_score}, '${v}')">TrustGate Check</button>
                        <a href="/agent/${agent.agent_id}" class="btn btn-primary" style="text-decoration:none">View Profile</a>
                        <a href="/badge/${agent.agent_id}.svg" target="_blank" class="btn btn-outline" style="text-decoration:none">Badge</a>
                    </div>
                </div>
            `;
        }

        function trustGate(agentId, score, verdict) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            const detail = document.getElementById('modal-detail');

            if (verdict === 'TRUST' && score >= 55) {
                title.innerHTML = '<span style="color:var(--trust)">&#10003; TrustGate: PASSED</span>';
                body.textContent = `Agent #${agentId} passes the TrustGate with a score of ${score}. Safe to interact.`;
                detail.innerHTML = '<p style="font-size:11px;color:var(--muted);margin-top:12px">On-chain: <code>TrustGate.isTrusted(' + agentId + ') → true</code></p>';
            } else {
                title.innerHTML = '<span style="color:var(--reject)">&#10007; TrustGate: BLOCKED</span>';
                body.textContent = `Agent #${agentId} is BLOCKED by TrustGate (score: ${score}, verdict: ${verdict}). Interaction denied.`;
                detail.innerHTML = '<p style="font-size:11px;color:var(--muted);margin-top:12px">On-chain: <code>TrustGate.isTrusted(' + agentId + ') → false</code></p>';
            }
            modal.classList.add('show');
        }

        function renderPagination(total, page, perPage) {
            const pages = Math.ceil(total / perPage);
            if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
            let html = '';
            html += `<button class="page-btn" ${page <= 1 ? 'disabled' : ''} onclick="goPage(${page-1})">&laquo;</button>`;
            for (let i = 1; i <= Math.min(pages, 7); i++) {
                html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
            }
            if (pages > 7) html += `<span style="color:var(--muted);padding:8px">...</span><button class="page-btn ${pages === page ? 'active' : ''}" onclick="goPage(${pages})">${pages}</button>`;
            html += `<button class="page-btn" ${page >= pages ? 'disabled' : ''} onclick="goPage(${page+1})">&raquo;</button>`;
            document.getElementById('pagination').innerHTML = html;
        }

        function goPage(p) { currentPage = p; loadAgents(); }

        async function loadAgents() {
            const params = new URLSearchParams({ page: currentPage, per_page: PER_PAGE, sort: 'score' });
            if (currentVerdict) params.set('verdict', currentVerdict);
            if (currentSearch) params.set('search', currentSearch);

            try {
                const r = await fetch('/api/marketplace?' + params);
                const data = await r.json();
                const grid = document.getElementById('grid');

                if (!data.agents || data.agents.length === 0) {
                    grid.innerHTML = '<div class="empty">No agents match your filters.</div>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                grid.innerHTML = data.agents.map(renderCard).join('');
                document.getElementById('total-count').textContent = `${data.total} agents scored`;
                renderPagination(data.total, data.page, data.per_page);
            } catch (e) {
                document.getElementById('grid').innerHTML = '<div class="empty">Failed to load agents.</div>';
            }
        }

        // Close modal on backdrop click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });

        loadAgents();
    </script>
</body>
</html>
